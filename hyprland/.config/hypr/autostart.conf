exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprpm reload -n
exec-once = swaync -c & awww-daemon & hypridle & ~/dotfiles/hyprland/.config/hypr/xdg.sh
exec-once = ~/.config/quickshell/wallpaper-thumbs.sh
exec-once = env QS_NO_RELOAD_POPUP=1 quickshell -p ~/.config/quickshell/TopBar/TopBar.qml
exec-once = quickshell -p ~/.config/quickshell/desktopclock/DesktopClock.qml > /dev/null 2>&1 & disown
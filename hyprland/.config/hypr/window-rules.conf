# ─────────────────────────────
# Global rules
# ─────────────────────────────
# CachyOSHello - float
windowrule = float on, match:class ^(CachyOSHello)$
# Suppress maximize event for all windows
windowrule = suppress_event maximize, match:class .*
# Global opacity (0.95)
windowrule = opacity 0.95, match:class ^(.*)$
# Gimp
windowrule = no_blur on, match:class ^(gimp)$
windowrule = opacity 1.0 override, match:class ^(gimp)$
# Minecraft
windowrule = no_blur on, match:class ^(Minecraft)$
windowrule = opacity 1.0 override, match:class ^(Minecraft)$
# Lunar Client
windowrule = no_blur on, match:title ^(Lunar Client.*)$
windowrule = opacity 1.0 override, match:title ^(Lunar Client.*)$



# ─────────────────────────────
# Layer rules (OSD / overlays)
# ─────────────────────────────
layerrule = no_anim on, match:namespace ^(volume_osd)$
layerrule = no_anim on, match:namespace ^(brightness_osd)$
layerrule = no_anim on, match:namespace ^(music_win)$
layerrule = no_anim on, match:namespace ^(usb_popup)$
layerrule = no_anim on, match:namespace ^(calendar_win)$
layerrule = no_anim on, match:namespace ^(network_win)$
layerrule = no_anim on, match:namespace hyprpicker

# ─────────────────────────────
# Window rules
# ─────────────────────────────

# ───────── music_vis ─────────
windowrule = float on, match:class ^(music_vis)$
windowrule = pin on, match:class ^(music_vis)$
# Poniższe 3 reguły musiały dostać "snake_case"
windowrule = no_initial_focus on, match:class ^(music_vis)$
windowrule = border_size 0, match:class ^(music_vis)$
windowrule = no_shadow on, match:class ^(music_vis)$
# Wymiary / pozycja (te zostają bez "on")
windowrule = size 700 350, match:class ^(music_vis)$
windowrule = move 12 720, match:class ^(music_vis)$

# ───────── Steam Games (General) ─────────
#windowrule = immediate on, match:class ^(steam_app_.*)$
windowrule = opacity 1.0 override, match:class ^(steam_app_.*)$
windowrule = no_blur on, match:class ^(steam_app_.*)$
#windowrule = fullscreen on, match:class ^(steam_app_.*)$`

# ───────── CS2 ─────────
windowrule = immediate on, match:class ^(cs2)$
windowrule = keep_aspect_ratio on, match:class ^(cs2)$
windowrule = opacity 1.0 override, match:class ^(cs2)$
windowrule = no_blur on, match:class ^(cs2)$

# ───────── Wallpaper Picker ─────────
windowrule = float on, match:title ^(wallpaper-picker)$
windowrule = center on, match:title ^(wallpaper-picker)$
windowrule = size 1920 500, match:title ^(wallpaper-picker)$
windowrule = opacity 1.0 override, match:title ^(wallpaper-picker)$
windowrule = no_blur on, match:title ^(wallpaper-picker)$
windowrule = border_size 0, match:title ^(wallpaper-picker)$
windowrule = no_shadow on, match:title ^(wallpaper-picker)$

# ───────── Battery Popup ─────────
windowrule = float on, match:title ^(battery-popup)$
windowrule = pin on, match:title ^(battery-popup)$
windowrule = size 480 760, match:title ^(battery-popup)$
windowrule = move 100%-500 70, match:title ^(battery-popup)$
windowrule = opacity 1.0 override, match:title ^(battery-popup)$
windowrule = no_blur on, match:title ^(battery-popup)$

# ───────── App Launcher ─────────
windowrule = float on, match:title ^(app-launcher)$
windowrule = center on, match:title ^(app-launcher)$
windowrule = size 1200 600, match:title ^(app-launcher)$
windowrule = animation slide, match:title ^(app-launcher)$
windowrule = opacity 1.0 override, match:title ^(app-launcher)$
windowrule = no_blur on, match:title ^(app-launcher)$

# ───────── Network Popup ─────────
windowrule = float on, match:title ^(network-popup)$
windowrule = pin on, match:title ^(network-popup)$
windowrule = size 900 700, match:title ^(network-popup)$
windowrule = move 100%-920 70, match:title ^(network-popup)$
windowrule = opacity 1.0 override, match:title ^(network-popup)$
windowrule = no_blur on, match:title ^(network-popup)$

# ───────── Music Window ─────────
windowrule = float on, match:title ^(music_win)$
windowrule = pin on, match:title ^(music_win)$
windowrule = size 700 620, match:title ^(music_win)$
windowrule = move 12 70, match:title ^(music_win)$
windowrule = opacity 1.0 override, match:title ^(music_win)$
windowrule = no_blur on, match:title ^(music_win)$

# ───────── Calendar Window ─────────
windowrule = float on, match:title ^(calendar_win)$
windowrule = pin on, match:title ^(calendar_win)$
windowrule = size 1300 750, match:title ^(calendar_win)$
windowrule = move 310 70, match:title ^(calendar_win)$
windowrule = opacity 1.0 override, match:title ^(calendar_win)$
windowrule = no_blur on, match:title ^(calendar_win)$

# ───────── Stewart ─────────
windowrule = float on, match:title ^(stewart)$
windowrule = pin on, match:title ^(stewart)$
windowrule = size 800 600, match:title ^(stewart)$
windowrule = center on, match:title ^(stewart)$
windowrule = opacity 1.0 override, match:title ^(stewart)$
windowrule = no_blur on, match:title ^(stewart)$
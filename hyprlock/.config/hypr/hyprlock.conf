source = $HOME/.config/hypr/onedarkpro.conf

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = CaskaydiaCove Nerd Font

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = ~/.config/backgrounds/liquid-purple.jpg
    blur_passes = 3
    blur_size = 4
}
image {
    path = ~/.face
    size = 50
    rounding = -1
    border_size = 0
    position = -900, -500
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:99999999] echo "Witaj, $(getent passwd $USER | cut -d ':' -f 5 | cut -d ',' -f 1)"
    font_size = 15
    font_family = $font
    color = $text
    position = -725, -500
    halign = center
    valign = center
}
input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 1
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = $text
    check_color = $green
    fail_color = $red

    font_color = $text

    fade_on_empty = false
    rounding = 10
    font_family = $font
    placeholder_text = Wprowadź hasło
    fail_text = Nieprawidłowe hasło
    dots_text_format = *
    dots_size = 0
    dots_spacing = 0.5
    position = 0, -100
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = $text
    position = 0, 200
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font
    color = $text
    position = 0, 100
    halign = center
    valign = center
}
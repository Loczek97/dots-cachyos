# Matugen Configuration
# This config generates color palette for Hyprland

[config]
reload_apps = true       # Reload applications after generating colors
set_wallpaper = false    # Don't set wallpaper (handled by WallpaperPicker)
type = "scheme-expressive"  # Use expressive colors that change noticeably
contrast = 0              # Maksymalny kontrast dla żywych kolorów

[config.reload_apps_list.hyprland]
hook = "hyprctl reload"

[config.reload_apps_list.kitty]
hook = "killall -SIGUSR1 kitty"

[config.reload_apps_list.rofi]
hook = "pkill rofi"

[config.reload_apps_list.quickshell]
hook = "~/.config/scripts/qs_manager.sh restart"

[config.reload_apps_list.eww]
hook = "eww --config ~/.config/eww/bar reload"

[templates.colors]
input_path = "~/.config/matugen/templates/colors.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty.conf"
output_path = "~/.config/kitty/current-theme.conf"

[templates.p10k]
input_path = "~/.config/matugen/templates/p10k-colors.zsh"
output_path = "~/.config/p10k-colors.zsh"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi-colors.rasi"
output_path = "~/.config/rofi/shared/colors.rasi"

[templates.quickshell_battery]
input_path = "~/.config/matugen/templates/MatugenTheme.qml"
output_path = "~/.config/quickshell/battery/MatugenTheme.qml"

[templates.quickshell_calendar]
input_path = "~/.config/matugen/templates/MatugenTheme.qml"
output_path = "~/.config/quickshell/calendar/MatugenTheme.qml"

[templates.quickshell_music]
input_path = "~/.config/matugen/templates/MatugenTheme.qml"
output_path = "~/.config/quickshell/music/MatugenTheme.qml"

[templates.quickshell_network]
input_path = "~/.config/matugen/templates/MatugenTheme.qml"
output_path = "~/.config/quickshell/network/MatugenTheme.qml"

[templates.quickshell_stewart]
input_path = "~/.config/matugen/templates/MatugenTheme.qml"
output_path = "~/.config/quickshell/stewart/MatugenTheme.qml"

[templates.quickshell_wallpaper]
input_path = "~/.config/matugen/templates/MatugenTheme.qml"
output_path = "~/.config/quickshell/wallpaper/MatugenTheme.qml"

[templates.quickshell_topbar]
input_path = "~/.config/matugen/templates/quickshell-topbar-colors.qml"
output_path = "~/.config/quickshell/TopBar/MatugenTheme.qml"

[templates.eww_bar]
input_path = "~/.config/matugen/templates/eww-colors.scss"
output_path = "~/.config/eww/bar/matugen-colors.scss"

[templates.swaync]
input_path = "~/.config/matugen/templates/swaync-colors.css"
output_path = "~/.config/swaync/matugen-colors.css"

[templates.discord]
input_path = '~/.config/matugen/templates/discord.css'
output_path = '~/.config/BetterDiscord/themes/matugen.theme.css'
